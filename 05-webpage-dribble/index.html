<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <main>
        <nav>
            <h1 id="logo">Dribbble</h1>
            <div class="links">
                <a href="#">Explore<i class="ri-arrow-drop-down-line"></i></a>
                <a href="#">Hire Talent<i class="ri-arrow-drop-down-line"></i></a>
                <a href="#">Get Hired<i class="ri-arrow-drop-down-line"></i></a>
                <a href="#">Community<i class="ri-arrow-drop-down-line"></i></a>
            </div>
            <div id="right">
                <button type="button">Sign up</button>
                <button type="button">Log in</button>
            </div>
        </nav>
        <div id="hero-section">
            <div class="hero-left">
                <div class="text">
                    <h1 class="text1">Discover the</h1>
                    <h1 class="text2">World's Top Designers</h1>
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Earum ut alias et distinctio est
                        quibusdam?</p>
                </div>
                <div class="filters">
                    <button type="button" class="btn1"><i class="ri-image-2-line"></i> Shots</button>
                    <button type="button"><i class="ri-group-line"></i> Designers</button>
                    <button type="button"><i class="ri-file-ai-2-line"></i> Services</button>
                    <button type="button" class="btn4"><i class="ri-building-line"></i> Agencies<i class="ri-arrow-right-s-line"></i></button>
                </div>
                <div class="search-container">
                    <input type="text" placeholder="What type of design are you interested in?">
                    <button type="submit" class="search-btn" title="search"><i class="ri-search-line"></i>
                    </button>
                </div>

                <div class="suggestions">
                    <h2>Popular: </h2>
                    <div class="btns">
                        <button type="button">dashboard</button>
                        <button type="button">landing page</button>
                        <button type="button">e-commerce</button>
                        <button type="button">logo</button>
                        <button type="button">card</button>
                        <button type="button">icons</button>
                    </div>
                </div>

            </div>
            <div class="hero-right">
                <video autoplay muted loop src="https://www.pexels.com/download/video/26610007/" id="vid"></video>
            </div>
        </div>
    </main>
</body>

</html>
